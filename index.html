<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANURAG TV</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #player-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }
        
        .video-js {
            width: 100% !important;
            height: 100% !important;
            background: #000;
        }
        
        .video-js .vjs-big-play-button {
            display: none !important;
        }
        
        .video-js video {
            object-fit: contain !important;
        }
        
        .video-js.vjs-fullscreen video {
            object-fit: cover !important;
        }
        
        .video-js .vjs-control-bar {
            background: rgba(0,0,0,0.7) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.05);
            height: 50px !important;
            padding: 0 12px !important;
        }
        
        .video-js .vjs-button {
            width: 40px !important;
            height: 40px !important;
        }
        
        .video-js .vjs-progress-control { flex: auto; margin: 0 10px; }
        .video-js .vjs-progress-holder { height: 5px; border-radius: 3px; }
        .video-js .vjs-play-progress { background: #ff2a2a; border-radius: 3px; }
        .video-js .vjs-play-progress:before { font-size: 12px; top: -3px; color: #ff2a2a; }
        .video-js .vjs-load-progress { background: rgba(255,255,255,0.15) !important; border-radius: 3px; }
        .video-js .vjs-load-progress div { background: rgba(255,255,255,0.2) !important; border-radius: 3px; }
        
        .live-corner {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            pointer-events: none;
        }
        .live-dot {
            width: 8px; height: 8px;
            background: #ff2a2a;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,42,42,0.8);
            animation: pulse 1.5s infinite;
        }
        .live-text {
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .error-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: #ff2a2a;
            padding: 20px 30px;
            border-radius: 10px;
            z-index: 9998;
            text-align: center;
            max-width: 400px;
            display: none;
            border: 1px solid rgba(255,42,42,0.3);
        }
        
        .error-message.show {
            display: block;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,42,42,0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255,42,42,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,42,42,0); }
        }
        
        @media (max-width: 768px) {
            .video-js .vjs-control-bar { height: 42px !important; padding: 0 8px !important; }
            .video-js .vjs-button { width: 34px !important; height: 34px !important; }
            .live-corner { top: 12px; left: 12px; padding: 4px 12px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div class="live-corner">
        <div class="live-dot"></div>
        <span class="live-text">ANURAG TV LIVE</span>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div id="player-container">
        <video id="live-player" class="video-js vjs-default-skin" controls autoplay muted playsinline>
            <source src="https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-6/0/master_2000.m3u8" type="application/x-mpegURL">
            <p class="vjs-no-js"></p>
        </video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <script>
        console.log('স্ক্রিপ্ট লোড হচ্ছে...');

        // ডকুমেন্ট লোড হওয়ার পর চালান
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM লোড সম্পূর্ণ');
            
            setTimeout(function() {
                const videoElement = document.getElementById('live-player');
                console.log('Video element খুঁজছি:', videoElement);

                if (!videoElement) {
                    console.error('Video element পাওয়া যায়নি!');
                    return;
                }

                try {
                    const player = videojs('live-player', {
                        html5: {
                            vhs: {
                                overrideNative: true
                            }
                        },
                        muted: true,
                        autoplay: true,
                        controls: true,
                        fill: true,
                        controlBar: {
                            children: ['playToggle', 'volumePanel', 'progressControl', 'fullscreenToggle']
                        }
                    });

                    console.log('প্লেয়ার সফলভাবে তৈরি হয়েছে');

                    player.ready(function() {
                        console.log('প্লেয়ার রেডি');
                        
                        const self = this;
                        
                        // প্লে করার চেষ্টা
                        const playPromise = self.play();
                        
                        if (playPromise !== undefined) {
                            playPromise.then(function() {
                                console.log('প্লে সফল');
                            }).catch(function(error) {
                                console.warn('প্লে এরর:', error);
                                self.muted(true);
                                self.play().catch(function(err) {
                                    console.error('মিউটেড প্লেও ব্যর্থ:', err);
                                    showError('প্লেব্যাক এরর: ' + err.message);
                                });
                            });
                        }

                        // 3 সেকেন্ড পর আনমিউট
                        setTimeout(function() {
                            if (!self.paused()) {
                                self.muted(false);
                            }
                        }, 3000);
                    });

                    // এরর হ্যান্ডলার
                    player.on('error', function() {
                        const error = player.error();
                        console.error('প্লেয়ার এরর:', error);
                        if (error) {
                            showError('এরর: ' + error.message);
                        }
                    });

                } catch (e) {
                    console.error('প্লেয়ার তৈরিতে এরর:', e);
                    showError('প্লেয়ার এরর: ' + e.message);
                }
            }, 100);
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
            console.error(message);
        }

        // ফুলস্ক্রিন চেষ্টা (ইউজার ইন্টারঅ্যাকশনের পর)
        document.addEventListener('click', function attemptFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(function(){});
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }
        }, { once: true });

    </script>
</body>
  </html>
