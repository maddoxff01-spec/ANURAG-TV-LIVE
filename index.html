<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANURAG TV LIVE</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        #player-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }
        
        .video-js {
            width: 100% !important;
            height: 100% !important;
            background: #000;
        }
        
        .video-js .vjs-big-play-button { display: none !important; }
        .video-js video { object-fit: contain !important; }
        .video-js.vjs-fullscreen video { object-fit: cover !important; }
        
        .video-js .vjs-control-bar {
            background: rgba(0,0,0,0.7) !important;
            backdrop-filter: blur(10px);
            height: 50px !important;
            padding: 0 12px !important;
        }
        
        .video-js .vjs-button { width: 40px !important; height: 40px !important; }
        .video-js .vjs-progress-control { flex: auto; margin: 0 10px; }
        .video-js .vjs-progress-holder { height: 5px; border-radius: 3px; }
        .video-js .vjs-play-progress { background: #ff2a2a; border-radius: 3px; }
        .video-js .vjs-load-progress { background: rgba(255,255,255,0.15) !important; }
        
        .live-corner {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .live-dot {
            width: 8px; height: 8px;
            background: #ff2a2a;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,42,42,0.8);
            animation: pulse 1.5s infinite;
        }
        .live-text {
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,42,42,0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255,42,42,0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,42,42,0); }
        }
    </style>
</head>
<body>

    <div class="live-corner">
        <div class="live-dot"></div>
        <span class="live-text">ANURAG TV LIVE</span>
    </div>

    <div id="player-container">
        <video id="live-player" class="video-js vjs-default-skin" controls autoplay muted playsinline>
            <source src="https://prod-cdn01-live.toffeelive.com/live/FIFA-2026-5/0/master_2000.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <script>
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPlayer);
        } else {
            initPlayer();
        }

        function initPlayer() {
            setTimeout(function() {
                const player = videojs('live-player', {
                    html5: { vhs: { overrideNative: true } },
                    muted: true,
                    autoplay: true,
                    controls: true,
                    fill: true,
                    controlBar: {
                        children: ['playToggle', 'volumePanel', 'progressControl', 'fullscreenToggle']
                    }
                });

                player.ready(function() {
                    this.play().catch(function(err) {
                        console.warn('প্লে ব্যর্থ:', err);
                    });

                    setTimeout(function() {
                        player.muted(false);
                    }, 3000);
                });

                player.on('error', function() {
                    console.error('প্লেয়ার এরর:', player.error());
                });
            }, 50);
        }
    </script>
</body>
</html>
